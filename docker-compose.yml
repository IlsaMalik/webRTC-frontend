version: "3.8"
services:
  neko:
    image: "ghcr.io/m1k1o/neko/chromium:latest"
    restart: unless-stopped
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    ports:
      - "8080:8080"
      - "59000-59100:59000-59100/udp"   # UDP range for WebRTC
    environment:
      NEKO_SERVER_BIND: "0.0.0.0:8080"
      NEKO_SERVER_CORS: "*"              # Allow any origin
      NEKO_MEMBER_PROVIDER: "multiuser"
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: "admin"
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: "neko"
      NEKO_DESKTOP_SCREEN: "1920x1080@30"
      NEKO_WEBRTC_EPR: "59000-59100"     # Use port range instead of mux  
      NEKO_NAT1TO1: "192.168.29.86"       # **Force localhost IP**
    # Remove any other NEKO_WEBRTC_* variables